services:
  web:
    image: michael73100/lescaissesduleman-web:1.1.0
    container_name: lescaissesduleman
    restart: unless-stopped
    ports:
      - "8082:8082"
    networks:
      - runtipi_tipi_main_network
    labels:
      # RunTipi crée déjà les routeurs ; on expose uniquement le backend attendu
      - "traefik.enable=true"
      - "traefik.docker.network=runtipi_tipi_main_network"
      # Même nom de service que les routeurs RunTipi (lescaissesduleman-_user)
      - "traefik.http.services.lescaissesduleman-_user.loadbalancer.server.port=8082"

networks:
  runtipi_tipi_main_network:
    external: true
