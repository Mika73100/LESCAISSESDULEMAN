services:
  web:
    image: michael73100/lescaissesduleman-web:1.1.3
    container_name: lescaissesduleman
    restart: unless-stopped
    expose:
      - "8082"
    networks:
      tipi_main_network:
        gw_priority: 1
    labels:
      generated: true
      traefik.enable: true
      traefik.docker.network: runtipi_tipi_main_network
      traefik.http.middlewares.lescaissesduleman-_user-web-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.lescaissesduleman-_user-web-redirect.redirectscheme.permanent: "true"
      traefik.http.middlewares.lescaissesduleman-_user-hsts.headers.stricttransportsecurity.maxage: "31536000"
      traefik.http.middlewares.lescaissesduleman-_user-hsts.headers.stricttransportsecurity.includesubdomains: "true"
      traefik.http.services.lescaissesduleman-_user.loadbalancer.server.port: "8082"
      traefik.http.routers.lescaissesduleman-_user-insecure.rule: Host(`lescaissesduleman.michaelbarreca.fr`)
      traefik.http.routers.lescaissesduleman-_user-insecure.entrypoints: web
      traefik.http.routers.lescaissesduleman-_user-insecure.service: lescaissesduleman-_user
      traefik.http.routers.lescaissesduleman-_user-insecure.middlewares: lescaissesduleman-_user-web-redirect
      traefik.http.routers.lescaissesduleman-_user.rule: Host(`lescaissesduleman.michaelbarreca.fr`)
      traefik.http.routers.lescaissesduleman-_user.entrypoints: websecure
      traefik.http.routers.lescaissesduleman-_user.service: lescaissesduleman-_user
      traefik.http.routers.lescaissesduleman-_user.tls.certresolver: myresolver
      traefik.http.routers.lescaissesduleman-_user.middlewares: lescaissesduleman-_user-hsts
      runtipi.managed: "true"
      runtipi.appurn: lescaissesduleman:_user

networks:
  tipi_main_network:
    name: runtipi_tipi_main_network
    external: true
